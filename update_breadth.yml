name: Daily Breadth Update

on:
  schedule:
    - cron: "0 1 * * 1-5"   # 평일 오전 10시 (KST = UTC+1시, 시장 마감 후)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas FinanceDataReader

      - name: Run breadth update
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python update_breadth.py

      - name: Commit & push CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "auto: breadth CSV update $(date +%Y%m%d)"
          git push
