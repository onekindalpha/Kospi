name: Update KR Breadth Data

on:
  schedule:
    - cron: "0 1 * * 1-5"   # 평일 오전 10시 KST (UTC+9)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas finance-datareader

      - name: Run update script
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python update_breadth.py

      - name: Commit and push updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update breadth data $(date +%Y%m%d)"
          git push
