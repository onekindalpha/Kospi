name: Update KR Breadth Data

on:
  schedule:
    - cron: "0 1 * * 1-5"   # 평일 오전 10시 KST
  workflow_dispatch:
    inputs:
      init_prices:
        description: "과거 prices/NH-NL 초기화"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas finance-datareader pykrx

      - name: Run update script (init-prices mode)
        if: ${{ github.event.inputs.init_prices == 'true' }}
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: |
          echo "=== prices 초기화 모드 ==="
          python update_breadth.py --init-prices --days 1200 || true

      - name: Run update script (daily mode)
        if: ${{ github.event.inputs.init_prices != 'true' }}
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: |
          echo "=== daily update mode ==="
          python update_breadth.py || true

      - name: Commit and push updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi

          git commit -m "chore: update breadth data $(date +%Y%m%d)"
          git push
