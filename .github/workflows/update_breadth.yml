name: Update KR Breadth Data

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas finance-datareader

      - name: Run update script
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: |
          chmod +x update_and_push.sh
          ./update_and_push.sh
